name: Build ImmortalWrt for JDCloud Arthur (Final Collection)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* google-cloud-sdk* ghc* zulu* llvm* firefox google-chrome* dotnet* openjdk* mysql*
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        rm -f .config
        cat <<EOF > .config
        CONFIG_TARGET_ipq60xx=y
        CONFIG_TARGET_ipq60xx_generic=y
        CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
        CONFIG_PACKAGE_luci=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-upnp=y
        EOF
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: List all files (调试诊断)
      run: |
        echo "正在列出所有生成的二进制文件..."
        find openwrt/bin/targets/ -type f

    - name: Organize files
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p ./artifact/
        # 更加激进的匹配：只要包含 ipq60xx 或 jdcloud 的 bin/img/gz 全部拷贝
        find openwrt/bin/targets/ -type f \( -name "*ipq60xx*" -o -name "*jdcloud*" -o -name "*sysupgrade*" \) -exec cp -f {} ./artifact/ \;
        # 额外抓取配置文件
        cp openwrt/.config ./artifact/config.buildinfo
        echo "已放入 artifact 文件夹的文件："
        ls -lh ./artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: ImmortalWrt_Arthur_Fixed
        path: ./artifact/
