name: Build ImmortalWrt for JDCloud RE-SS-01

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        # 核心：精准锁定 JDCloud 亚瑟
        echo "CONFIG_TARGET_ipq60xx=y" > .config
        echo "CONFIG_TARGET_ipq60xx_generic=y" >> .config
        echo "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" >> .config
        
        # 强制开启编译镜像的所有必要组件
        echo "CONFIG_TARGET_DEVICE_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" >> .config
        echo "CONFIG_HAS_SUBTARGET_GENERIC=y" >> .config
        echo "CONFIG_TARGET_BOARD=\"ipq60xx\"" >> .config
        
        # 界面和常用插件
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 这一步必须跑很久才正常
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files (核心修复)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p ./artifact/
        # 深度搜索所有生成的 bin 文件并拷贝出来
        find openwrt/bin/targets/ -name "*jdcloud*" -type f -exec cp {} ./artifact/ \;
        # 同时拷贝配置文件方便检查
        cp openwrt/.config ./artifact/config.txt
        echo "已找到以下固件文件："
        ls -l ./artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: ImmortalWrt_JDCloud_Arthur
        path: ./artifact/
