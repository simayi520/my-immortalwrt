name: Build ImmortalWrt for JDCloud RE-SS-01

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  # 强制切换到 23.05 稳定版分支，这对亚瑟最友好
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        # 精准匹配亚瑟硬件 ID
        echo "CONFIG_TARGET_ipq60xx=y" > .config
        echo "CONFIG_TARGET_ipq60xx_generic=y" >> .config
        echo "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" >> .config
        
        # 强制开启 LuCI 界面和中文
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files (暴力抓取)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p ./artifact/
        # 进入 bin 目录，把所有 .bin 和 .img 文件通通抓出来
        cd openwrt/bin/targets/ipq60xx/generic/
        cp -f *.bin ../../../../artifact/ 2>/dev/null || true
        cp -f *.img ../../../../artifact/ 2>/dev/null || true
        cp -f config.buildinfo ../../../../artifact/ 2>/dev/null || true
        echo "抓取完成，当前 artifact 目录内容："
        ls -lh ../../../../artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: Arthur_Firmware_Final
        path: ./artifact/
