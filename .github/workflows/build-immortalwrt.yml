name: Build ImmortalWrt for JDCloud Arthur (Final Strike)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* google-cloud-sdk* ghc* zulu* llvm* firefox google-chrome* dotnet* openjdk* mysql*
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        # 强制清除并写入亚瑟最完整的 Target 信息
        rm -f .config
        cat <<EOF > .config
        CONFIG_TARGET_ipq60xx=y
        CONFIG_TARGET_ipq60xx_generic=y
        CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
        CONFIG_PACKAGE_luci=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-wol=y
        EOF
        
        # 扩展配置以确保依赖完整
        sed -i 's/^[ \t]*//g' .config
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 如果再次成功，耗时应该在 2 小时左右
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files (全盘搜寻)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p ./artifact/
        # 只要是包含 jdcloud 或 ipq60xx 的 bin/img 文件，通通抓走
        find openwrt/bin/targets/ -type f -name "*jdcloud*" -exec cp -f {} ./artifact/ \;
        find openwrt/bin/targets/ -type f -name "*ipq60xx*" -exec cp -f {} ./artifact/ \;
        find openwrt/bin/targets/ -type f -name "*sysupgrade.bin" -exec cp -f {} ./artifact/ \;
        echo "抓取结果内容："
        ls -lh ./artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: Arthur_ImmortalWrt_Final_Package
        path: ./artifact/
