name: Build ImmortalWrt for JDCloud RE-SS-01

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        # 1. 写入京东云核心配置
        cat <<EOT > .config
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_jdcloud_re-ss-01=y
        CONFIG_PACKAGE_luci=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-upnp=y
        EOT
        
        # 2. 核心修正：强制关闭默认的 OpenWrt One 选项，防止它抢占文件名
        echo "# CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_openwrt_one-nor is not set" >> .config
        echo "# CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_openwrt_one-snand is not set" >> .config
        
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware to Actions
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_JDCloud_RE-SS-01_FINAL
        path: openwrt/bin/targets/mediatek/filogic/*.bin
