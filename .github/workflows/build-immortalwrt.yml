name: Build ImmortalWrt for JDCloud RE-SS-01 (Arthur-Specific)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* google-cloud-sdk* ghc* zulu* llvm* firefox google-chrome* dotnet* openjdk* mysql*
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        rm -f .config
        # 强制注入高通 IPQ60xx 和亚瑟的配置树
        echo "CONFIG_TARGET_ipq60xx=y" >> .config
        echo "CONFIG_TARGET_ipq60xx_generic=y" >> .config
        echo "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" >> .config
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        
        # 这一步非常关键：让编译器根据上述种子配置补全所有依赖
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        # 这里会耗时约 2 小时，如果低于 1 小时说明架构选错了
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files (深度收割)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p ./artifact/
        # 重点：直接去高通平台的输出目录拿文件
        # 如果这个目录下没文件，说明真的没编对
        if [ -d "openwrt/bin/targets/ipq60xx/generic/" ]; then
          cp -f openwrt/bin/targets/ipq60xx/generic/*jdcloud* ./artifact/ || true
          cp -f openwrt/bin/targets/ipq60xx/generic/*sysupgrade.bin ./artifact/ || true
        fi
        # 顺便把生成的 .config 也带出来供我们检查
        cp openwrt/.config ./artifact/config.buildinfo
        ls -lh ./artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: Arthur_Qualcomm_Firmware
        path: ./artifact/
