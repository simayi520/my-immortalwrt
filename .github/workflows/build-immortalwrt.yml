name: Build ImmortalWrt for JDCloud Arthur (Final Recovery)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* google-cloud-sdk* ghc* zulu* llvm* firefox google-chrome* dotnet* openjdk* mysql*
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        # 彻底清空并重写配置，防止退回 x86
        rm -f .config
        cat <<EOF > .config
        CONFIG_TARGET_ipq60xx=y
        CONFIG_TARGET_ipq60xx_generic=y
        CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
        CONFIG_PACKAGE_luci=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        EOF
        
        make defconfig
        # 强制检查：如果生成的配置不是亚瑟，立刻自毁报错
        if ! grep -q "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" .config; then
          echo "致命错误：配置未能正确锁定京东云亚瑟！"
          exit 1
        fi

    - name: Download package
      run: |
        cd openwrt
        make download -j8

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 核心：必须跑够 2 小时才是真正的编译
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files (全盘搜寻)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p ./artifact/
        # 不管路径在哪，只要是 bin 或 img，通通拷贝出来
        find openwrt/bin/targets/ -type f -name "*.bin" -exec cp -f {} ./artifact/ \;
        find openwrt/bin/targets/ -type f -name "*.img" -exec cp -f {} ./artifact/ \;
        # 顺便把编译日志存一份
        cp openwrt/.config ./artifact/config.buildinfo
        echo "发现固件列表如下："
        ls -lh ./artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: Arthur_ImmortalWrt_Final
        path: ./artifact/
